<!DOCTYPE html>
<html lang="en-US">
<head>
    <style>
        body { font-family: sans-serif; padding: 10px; min-width: 300px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button {
            background: #5c6bc0; color: white; border: none;
            padding: 10px 20px; cursor: pointer; border-radius: 4px;
            width: 100%;
        }
        button:hover { background: #3f51b5; }
        #status { margin-top: 10px; color: green; text-align: center; height: 20px; }
    </style>
</head>
<body>
<div class="form-group">
    <label for="apiUrl">API Endpoint</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:8080/api/queue">
</div>
<div class="form-group">
    <label for="apiSecret">Secret Token</label>
    <input type="password" id="apiSecret" placeholder="Secret from .env">
</div>
<button id="save">Save Settings</button>
<div id="status"></div>
<script src="options.js"></script>
</body>
</html>
